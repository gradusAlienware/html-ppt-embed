<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026 — Palpites</title>
<link href="vendor/fonts/nunito.css" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dk1:#002060;--brand:#296DB7;--accent1:#E68E18;--accent2:#306F9F;--accent3:#800000;
  --bg:#F4F6FA;--white:#fff;--border:#D9DCE6;
  --text:#12376C;--text2:#4A5E73;--text3:#7B8EA0;--green:#00B050;
  --shadow:0 2px 8px rgba(0,32,96,.08);--r:4px;
}
body{font-family:'Nunito','Calibri',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.hdr{background:var(--dk1);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-l{display:flex;align-items:center;gap:0}
.hdr-sep{width:1px;height:28px;background:rgba(157,177,207,.35);margin:0 18px}
.hdr-item{font-size:13px;color:rgba(255,255,255,.75)}
.hdr-item.bold{font-weight:700;color:#fff}
.hdr-dash{font-weight:700;color:rgba(255,255,255,.4);margin:0 9px}
.hdr-badge{background:var(--accent1);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.4px}
.nav{background:#fff;border-bottom:2px solid var(--border);display:flex;padding:0 24px;overflow-x:auto}
.nav-tab{padding:14px 20px;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s,border-color .15s;user-select:none}
.nav-tab:hover{color:var(--dk1)}.nav-tab.active{color:var(--dk1);border-bottom-color:var(--accent1)}
.main{max-width:1140px;margin:0 auto;padding:24px 20px}
.section{display:none}.section.active{display:block}
.inner-tabs{display:flex;gap:4px;margin-bottom:20px;background:#E8EEF5;border-radius:6px;padding:4px;flex-wrap:wrap}
.inner-tab{padding:8px 18px;font-size:12px;font-weight:700;border-radius:4px;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:inherit;transition:all .15s;user-select:none;white-space:nowrap}
.inner-tab.active{background:#fff;color:var(--dk1);box-shadow:0 1px 4px rgba(0,32,96,.12)}
.inner-section{display:none}.inner-section.active{display:block}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.card::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--dk1),var(--brand))}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 16px 0;gap:8px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dk1)}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.card-body{padding:10px 16px 14px}
.btn{border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;font-weight:700;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--dk1);color:#fff;padding:9px 22px;font-size:13px}.btn-primary:hover{opacity:.88}
.btn-save{background:var(--accent1);color:#fff;padding:9px 24px;font-size:13px}.btn-save:hover{opacity:.88}
.btn-danger{background:#fff;border:1px solid #f5c1c1;color:var(--accent3);padding:6px 12px;font-size:12px}.btn-danger:hover{background:#fff5f5}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--text);padding:8px 16px;font-size:12px;font-family:inherit;font-weight:700;border-radius:var(--r);cursor:pointer}.btn-outline:hover{border-color:var(--brand);color:var(--brand)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dk1);color:#fff;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .25s;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}
.week-block{margin-bottom:10px;border:1px solid var(--border);border-radius:6px;background:#fff;box-shadow:var(--shadow);overflow:hidden}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;background:#fff;transition:background .15s;gap:10px}
.week-header:hover{background:#f4f7fd}
.week-header-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1;min-width:0}
.week-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dk1);white-space:nowrap}
.week-dates{font-size:11px;color:var(--text3);font-weight:600;white-space:nowrap}
.week-pills{display:flex;gap:5px;flex-wrap:wrap}
.wpill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;white-space:nowrap}
.wpill-games{background:#EAF0F8;color:var(--dk1)}.wpill-done{background:#e5f7ec;color:#007833}
.week-toggle{font-size:14px;color:var(--text3);transition:transform .2s;line-height:1;flex-shrink:0}
.week-toggle.open{transform:rotate(180deg)}
.week-body{border-top:1px solid var(--border)}.week-body.hidden{display:none}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px;padding:12px}
.draw-picker{margin-top:8px;padding:7px 10px;background:#FFF8EC;border:1.5px solid #E68E18;border-radius:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.draw-picker-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7a4e00;white-space:nowrap}
.draw-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:4px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:var(--dk1);font-family:inherit;transition:.12s;flex:1;justify-content:center;min-width:90px}
.draw-btn:hover{border-color:var(--brand)}
.draw-btn.selected{background:var(--brand);border-color:var(--brand);color:#fff}

.game-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;box-shadow:0 1px 3px rgba(0,32,96,.05);transition:border-color .15s}
.game-card:hover{border-color:var(--brand)}.game-card.has-result{background:#f7fbf7;border-color:#b7ddb7}
.game-meta{font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ko-label{display:inline-block;background:var(--accent1);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.4px;text-transform:uppercase}
.game-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.team{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--dk1);min-width:0}
.team.away{flex-direction:row-reverse;text-align:right}.team-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-inputs{display:flex;align-items:center;gap:4px;flex-shrink:0}
.score-inp{width:34px;height:34px;text-align:center;font-size:15px;font-weight:700;border:1.5px solid var(--border);border-radius:var(--r);color:var(--dk1);font-family:inherit;background:#fff;transition:border-color .15s}
.score-inp:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px rgba(41,109,183,.1)}
.score-inp:disabled{background:#f4f6fa;color:#bbb;border-color:#e4e8f0;cursor:not-allowed}
.score-sep{font-size:13px;color:var(--text3);font-weight:700}
.result-badges{display:flex;align-items:center;gap:4px;margin-top:6px;justify-content:center;flex-wrap:wrap}
.rb{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700}
.rb.exact{background:#e5f7ec;color:#007833}.rb.diff{background:#EAF0F8;color:var(--brand)}
.rb.res{background:#F0EAF8;color:#6A1B9A}.rb.result-real{background:#fff3e0;color:#bf6000}
.rb.wrong{background:#f5e5e5;color:var(--accent3)}
.special-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px;padding:12px}
.special-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;box-shadow:0 1px 3px rgba(0,32,96,.05);display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.special-card:hover{border-color:var(--brand);background:#f8faff}
.special-card.selected{border-color:var(--accent1);background:#FFF8ED}
.special-card.correct{border-color:var(--green);background:#f0fbf4}
.special-card.wrong-pick{border-color:#e0b0b0;background:#fff8f8}
.special-card.no-click{cursor:default}
.special-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .15s}
.special-card.selected .special-check{background:var(--accent1);border-color:var(--accent1);color:#fff}
.special-card.correct .special-check{background:var(--green);border-color:var(--green);color:#fff}
.special-card.wrong-pick .special-check{background:#e0b0b0;border-color:#e0b0b0;color:#fff}
.special-info{flex:1;min-width:0}
.special-teams{font-size:12px;font-weight:700;color:var(--dk1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.special-meta{font-size:10px;color:var(--text3);margin-top:2px}
.special-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;border-bottom:1px solid var(--border)}
.special-title{font-size:12px;font-weight:700;color:var(--dk1);flex:1;line-height:1.5}
.special-counter{font-size:11px;color:var(--text3);font-weight:600;white-space:nowrap;margin-left:8px}
.special-counter.maxed{color:var(--accent1);font-weight:700}
.art-box{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.art-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:3px}
.art-sublabel{font-size:11px;color:var(--text2)}
.art-input{border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-size:14px;font-family:inherit;color:var(--dk1);outline:none;width:220px}
.art-input:focus{border-color:var(--brand);box-shadow:0 0 0 2px rgba(41,109,183,.1)}
.art-input:disabled{background:#f4f6fa;color:#aaa;cursor:not-allowed}
.art-pts{display:flex;align-items:center;gap:6px;background:#FFF8ED;border:1px solid #F5D89A;border-radius:var(--r);padding:6px 14px;font-size:13px;font-weight:700;color:var(--accent1);white-space:nowrap}
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:700;color:var(--dk1)}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:2px}
.player-bar{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);flex-wrap:wrap}
.player-bar label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);flex-shrink:0}
.player-bar input{flex:1;min-width:180px;max-width:300px;border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:13px;color:var(--dk1);font-family:inherit;outline:none}
.player-bar input:focus{border-color:var(--brand)}
.rules-box{background:#EAF0F8;border-left:4px solid var(--accent2);border-radius:0 var(--r) var(--r) 0;padding:10px 16px;margin-bottom:16px;font-size:12px;color:var(--dk1);line-height:1.9}
.rules-box strong{color:var(--accent1);font-weight:800}
.flex-end{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.add-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.add-row input{flex:1;min-width:180px;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-size:13px;font-family:inherit;outline:none;color:var(--dk1)}
.add-row input:focus{border-color:var(--brand)}
.empty{text-align:center;padding:28px;color:var(--text3);font-size:13px}
.info-box{background:#fff3e0;border-left:4px solid var(--accent1);border-radius:0 var(--r) var(--r) 0;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--dk1);line-height:1.8}
.info-box strong{font-weight:800}

/* AUTOCOMPLETE */
.ac-wrap{position:relative;display:inline-block}
.ac-input.ac-selected{
  background:linear-gradient(135deg,#e8f5e9,#f1f8e9);
  border-color:#43a047 !important;
  color:#2e7d32;
  font-weight:700;
}
.ac-input.ac-selected::after{content:'✓';}
.ac-input{border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-size:14px;font-family:inherit;color:var(--dk1);outline:none;width:260px}
.ac-input:focus{border-color:var(--brand);box-shadow:0 0 0 2px rgba(41,109,183,.1)}
.ac-input:disabled{background:#f4f6fa;color:#aaa;cursor:not-allowed}
.ac-dropdown{position:absolute;top:calc(100% + 4px);left:0;width:320px;background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:0 6px 20px rgba(0,32,96,.14);z-index:1000;max-height:220px;overflow-y:auto;display:none}
.ac-dropdown.open{display:block}
.ac-item{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--dk1);display:flex;justify-content:space-between;align-items:center;gap:8px}
.ac-item:hover,.ac-item.focused{background:#EAF0F8}
.ac-item-name{font-weight:700}
.ac-item-country{font-size:11px;color:var(--text3);white-space:nowrap}
.ac-highlight{color:var(--brand)}
</style>
</head>

/* ── AUTOCOMPLETE ENGINE ────────────────────── */
function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}

function buildAC(inputId, dropId, onSelect){
  const inp=document.getElementById(inputId);
  const drop=document.getElementById(dropId);
  if(!inp||!drop) return;
  if(inp.dataset.acBound) return;  // already initialized
  inp.dataset.acBound='1';
  let focusedIdx=-1;

  function show(){
    const query=inp.value.trim();
    if(!query||query.length<2){drop.classList.remove('open');return;}
    const q=normalize(query);
    const matches=PLAYERS.filter(p=>normalize(p.n).includes(q)||normalize(p.c).includes(q)).slice(0,10);
    if(!matches.length){drop.classList.remove('open');return;}
    drop.innerHTML=matches.map((p,i)=>{
      const parts=p.n.split(new RegExp('('+query+')', 'gi'));
      const hl=parts.map(pt=>normalize(pt)===q?'<span class="ac-highlight">'+pt+'</span>':pt).join('');
      return '<div class="ac-item" data-name="'+p.n+'" data-country="'+p.c+'">'
        +'<span class="ac-item-name">'+hl+'</span>'
        +'<span class="ac-item-country">'+p.c+'</span></div>';
    }).join('');
    // Attach click handlers
    drop.querySelectorAll('.ac-item').forEach(el=>{
      el.addEventListener('mousedown',e=>{
        e.preventDefault();
        inp.value=el.dataset.name+' ('+el.dataset.country+')';
        inp.classList.add('ac-selected');
        inp.dataset.confirmed='1';
        drop.classList.remove('open');
        if(onSelect) onSelect(el.dataset.name, el.dataset.country);
      });
    });
    focusedIdx=-1;
    drop.classList.add('open');
  }

  inp.addEventListener('input', ()=>{
    inp.classList.remove('ac-selected');
    inp.dataset.confirmed='';
    if(onSelect) onSelect('',''); // clear selection
    show();
  });
  inp.addEventListener('blur',()=>setTimeout(()=>drop.classList.remove('open'),200));
  inp.addEventListener('keydown',e=>{
    const items=[...drop.querySelectorAll('.ac-item')];
    if(e.key==='ArrowDown'){e.preventDefault();focusedIdx=Math.min(focusedIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('focused',i===focusedIdx));}
    else if(e.key==='ArrowUp'){e.preventDefault();focusedIdx=Math.max(focusedIdx-1,0);items.forEach((el,i)=>el.classList.toggle('focused',i===focusedIdx));}
    else if(e.key==='Enter'&&focusedIdx>=0){e.preventDefault();items[focusedIdx].dispatchEvent(new MouseEvent('mousedown'));}
    else if(e.key==='Escape'){drop.classList.remove('open');}
  });
}

function getPool(type){
  if(type==='goleada') return [...GROUPS_GAMES, ...buildResolvedKO()];
  return buildResolvedKO(); // prorrogacao/penaltis: only KO games
}

function calcScore(picks,artilheiro,goleada,prorrogacao,penaltis,results,artResult){
  let pts=0,res=0,dif=0,exact=0,gol=0,prorr=0,pen=0,art=false;
  ALL_GAMES.forEach(g=>{
    const r=results[g.id],p=picks[g.id];
    if(!r||!p||p.h===''||p.a==='') return;
    const ph=parseInt(p.h),pa=parseInt(p.a),rh=r.h,ra=r.a;
    if(isNaN(ph)||isNaN(pa)) return;
    const rw=rh>ra?'h':rh<ra?'a':'d',pw=ph>pa?'h':ph<pa?'a':'d';
    if(pw===rw){pts+=2;res++;}
    if(ph===rh&&pa===ra){pts+=1;exact++;}
    else if(Math.abs(ph-pa)===Math.abs(rh-ra)){pts+=1;dif++;}
  });
  (goleada||[]).forEach(gid=>{const r=results[gid];if(r&&Math.abs(r.h-r.a)>=3){pts+=3;gol++;}});
  (prorrogacao||[]).forEach(gid=>{const r=results[gid];if(r&&r.prorr&&!r.pen){pts+=3;prorr++;}});
  (penaltis||[]).forEach(gid=>{const r=results[gid];if(r&&r.pen){pts+=3;pen++;}});
  if(artResult&&artilheiro){
    if(artResult.split(',').map(x=>x.trim().toLowerCase()).includes(artilheiro.trim().toLowerCase())){pts+=10;art=true;}
  }
  return{pts,res,dif,exact,gol,prorr,pen,art};
}

function switchTab(id,el){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');document.getElementById('sec-'+id).classList.add('active');
  if(typeof onTabSwitch==='function') onTabSwitch(id);
}
function switchInner(id,el){
  document.querySelectorAll('.inner-tab').forEach(t=>t.classList.remove('active'));

  el.classList.add('active');document.getElementById('inner-'+id).classList.add('active');

}
function toggleWeek(wid){
  const body=document.getElementById('wbody-'+wid);
  const tog=document.getElementById('wt-'+wid);
  const hidden=body.classList.toggle('hidden');
  if(hidden) tog.classList.remove('open'); else tog.classList.add('open');
}
function weekBlockHtml(wid,label,dates,games,cardFn){
  const done=games.filter(g=>typeof getResult==='function'&&getResult(g.id)).length;
  let pills='<span class="wpill wpill-games">'+games.length+' jogos</span>';
  if(done) pills+='<span class="wpill wpill-done">&#x2713; '+done+' encerrados</span>';
  const gHtml=games.sort((a,b)=>a.sk-b.sk).map(g=>cardFn(g)).join('');
  return '<div class="week-block" id="wb-'+wid+'">'
    +'<div class="week-header" data-wid="'+wid+'" onclick="toggleWeek(this.dataset.wid)">'
    +'<div class="week-header-left">'
    +'<span class="week-label">'+label+'</span>'
    +'<span class="week-dates">'+dates+'</span>'
    +'<div class="week-pills">'+pills+'</div>'
    +'</div>'
    +'<span class="week-toggle open" id="wt-'+wid+'">&#x25BC;</span>'
    +'</div>'
    +'<div class="week-body" id="wbody-'+wid+'">'
    +'<div class="games-grid">'+gHtml+'</div>'
    +'</div></div>';
}

/* ── GAME CARD ─────────────────────────────── */
function gameCard(g){
  const pick=P.picks[g.id]||{h:'',a:''};
  const isKO=!!g.ko;
  const koLabel=g.ko?'<span class="ko-label">'+g.ko+'</span>':'';
  const gh=parseInt(pick.h), ga=parseInt(pick.a);
  const isDraw=isKO&&!isNaN(gh)&&!isNaN(ga)&&pick.h!==''&&pick.a!==''&&gh===ga;
  let drawHtml='';
  if(isDraw){
    const wh=pick.w==='home', wa=pick.w==='away';
    const rh=resolveKOSlot(g.home,g.id)||g.home;
    const ra=resolveKOSlot(g.away,g.id)||g.away;
    drawHtml='<div class="draw-picker">'
      +'<span class="draw-picker-label">Pênaltis — quem avança?</span>'
      +'<button class="draw-btn'+(wh?' selected':'')+'" data-dw-gid="'+g.id+'" data-dw-side="home">'
      +flagImg(rh)+' '+rh+'</button>'
      +'<button class="draw-btn'+(wa?' selected':'')+'" data-dw-gid="'+g.id+'" data-dw-side="away">'
      +flagImg(ra)+' '+ra+'</button>'
      +'</div>';
  }
  return '<div class="game-card" data-gid="'+g.id+'">'
    +'<div class="game-meta">'+g.date+' \u00b7 '+g.city+' '+koLabel+'</div>'
    +'<div class="game-row">'
    +'<div class="team">'+flagImg(g.home)+'<span class="team-name" style="margin-left:5px">'+g.home+'</span></div>'
    +'<div class="score-inputs">'
    +'<input type="number" class="score-inp" min="0" max="30" placeholder="?" value="'+pick.h+'" oninput="setPick(this,\'h\')">'
    +'<span class="score-sep">\u00d7</span>'
    +'<input type="number" class="score-inp" min="0" max="30" placeholder="?" value="'+pick.a+'" oninput="setPick(this,\'a\')">'
    +'</div>'
    +'<div class="team away"><span class="team-name" style="margin-right:5px">'+g.away+'</span>'+flagImg(g.away)+'</div>'
    +'</div>'+drawHtml+'</div>';
}


function setPick(el,side){
  const gid=el.closest('[data-gid]').dataset.gid;
  if(!P.picks[gid]) P.picks[gid]={h:'',a:''};
  P.picks[gid][side]=el.value;
  // If score is no longer a draw, clear the manual winner
  const gh=parseInt(P.picks[gid].h), ga=parseInt(P.picks[gid].a);
  if(!isNaN(gh)&&!isNaN(ga)&&gh!==ga) P.picks[gid].w=null;
  updateKpis();
  // Re-render knockout so R16 shows real teams as group picks come in
  const isGroupGame=GROUPS_GAMES.some(g=>g.id===gid);
  const isKOGame=KNOCKOUT_GAMES.some(g=>g.id===gid);
  if(isGroupGame||isKOGame){
    renderKnockout();
    renderSpecial('goleada');
    renderSpecial('prorrogacao');
    renderSpecial('penaltis');
  }
}

function setDrawWinner(gid, side){
  // side is 'home' or 'away'
  if(!P.picks[gid]) P.picks[gid]={h:'',a:''};
  P.picks[gid].w = P.picks[gid].w===side ? null : side;
  renderKnockout();
  renderSpecial('goleada');
  renderSpecial('prorrogacao');
  renderSpecial('penaltis');
}

/* ── WEEK RENDER ───────────────────────────── */
function renderGroups(){
  document.getElementById('grupos-container').innerHTML=WEEKS_GROUPS.map(w=>{
    const games=GROUPS_GAMES.filter(g=>{
      const d=parseInt(g.date.split('/')[0]),m=parseInt(g.date.split('/')[1]);
      return m===w.month&&w.days.includes(d);
    });
    return weekBlockHtml('G'+w.key,w.label,w.dates,games,gameCard);
  }).join('');
}
/* ── KO CHAIN RESOLVER ──────────────────────────────────────────────── */
function calcGroupStandings(){
  const groups={};
  GROUPS_GAMES.forEach(g=>{
    if(!g.group)return;
    if(!groups[g.group])groups[g.group]={teams:{},played:0,total:0};
    groups[g.group].total++;
    [g.home,g.away].forEach(t=>{if(!groups[g.group].teams[t])groups[g.group].teams[t]={pts:0,gd:0,gf:0};});
  });
  GROUPS_GAMES.forEach(g=>{
    if(!g.group)return;
    const pk=P.picks[g.id];
    if(!pk||pk.h===''||pk.a==='')return;
    const gh=parseInt(pk.h),ga=parseInt(pk.a);
    if(isNaN(gh)||isNaN(ga))return;
    groups[g.group].played++;
    groups[g.group].teams[g.home].gd+=gh-ga; groups[g.group].teams[g.home].gf+=gh;
    groups[g.group].teams[g.away].gd+=ga-gh; groups[g.group].teams[g.away].gf+=ga;
    if(gh>ga){groups[g.group].teams[g.home].pts+=3;}
    else if(ga>gh){groups[g.group].teams[g.away].pts+=3;}
    else{groups[g.group].teams[g.home].pts+=1;groups[g.group].teams[g.away].pts+=1;}
  });
  const standings={};
  Object.keys(groups).sort().forEach(grp=>{
    const {teams,played,total}=groups[grp];
    // Only expose standings when ALL group games are filled
    if(played<total){standings[grp]=null;return;}
    standings[grp]=Object.entries(teams)
      .sort((a,b)=>b[1].pts-a[1].pts||b[1].gd-a[1].gd||b[1].gf-a[1].gf)
      .map(e=>({team:e[0],pts:e[1].pts,gd:e[1].gd,gf:e[1].gf}));
  });
  return standings;
}

// Resolve "1º Grupo X" / "2º Grupo X" — only if that group is complete
function resolveGroupTeam(label){
  const m=label.match(/^([12])[º°°] Grupo ([A-L])$/);
  if(!m)return null;
  const pos=parseInt(m[1])-1, grp=m[2];
  const st=calcGroupStandings();
  if(!st[grp]||!st[grp][pos])return null;
  return st[grp][pos].team;
}

// Get winner of a KO game from picks
function koGameWinner(gid){
  const g=KNOCKOUT_GAMES.find(x=>x.id===gid);
  if(!g)return null;
  const pk=P.picks[gid];
  if(!pk||pk.h===''||pk.a==='')return null;
  const gh=parseInt(pk.h),ga=parseInt(pk.a);
  if(isNaN(gh)||isNaN(ga))return null;
  const rh=resolveKOSlot(g.home,g.id), ra=resolveKOSlot(g.away,g.id);
  if(gh===ga){
    if(!pk.w)return null;
    return pk.w==='home'?rh:ra;
  }
  return gh>ga ? rh : ra;
}

function koGameLoser(gid){
  const g=KNOCKOUT_GAMES.find(x=>x.id===gid);
  if(!g)return null;
  const pk=P.picks[gid];
  if(!pk||pk.h===''||pk.a==='')return null;
  const gh=parseInt(pk.h),ga=parseInt(pk.a);
  if(isNaN(gh)||isNaN(ga))return null;
  const rh=resolveKOSlot(g.home,g.id), ra=resolveKOSlot(g.away,g.id);
  if(gh===ga){
    if(!pk.w)return null;
    return pk.w==='home'?ra:rh;
  }
  return gh>ga ? ra : rh;
}

// Recursively resolve any slot label to a real team
// Compute the 8 best 3rd-place teams and assign them to R32 slots
// Slots that host a 3rd-place team (in ranking order 1st-best to 8th-best):
const THIRD_SLOTS=['k02','k07','k05','k08','k13','k09','k10','k15'];

function calc3rdPlaceTeams(){
  const st=calcGroupStandings();
  const thirds=Object.keys(st).sort().map(grp=>{
    if(!st[grp])return null; // group not complete yet
    const entry=st[grp][2];
    return entry?{team:entry.team,pts:entry.pts,gd:entry.gd,gf:entry.gf,grp}:null;
  }).filter(Boolean);
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.grp.localeCompare(b.grp));
  return thirds.slice(0,8).map(x=>x.team);
}

// Cache to avoid recomputing multiple times per render
let _thirdCache=null;
function get3rdForSlot(slotId){
  if(!_thirdCache) _thirdCache=calc3rdPlaceTeams();
  const idx=THIRD_SLOTS.indexOf(slotId);
  return idx>=0?(_thirdCache[idx]||'3º melhor'):'3º melhor';
}
function clearThirdCache(){_thirdCache=null;}

function resolveKOSlot(label,gameId){
  // Group-based slot
  const grpTeam=resolveGroupTeam(label);
  if(grpTeam)return grpTeam;
  // "3º melhor" - resolve from ranked 3rd-place teams
  if(label==='3º melhor'&&gameId) return get3rdForSlot(gameId);
  // "Vencedor kXX"
  const mw=label.match(/^Vencedor (k\d+)$/);
  if(mw)return koGameWinner(mw[1])||label;
  // "Semifinalista A/B"
  if(label==='Semifinalista A')return koGameLoser('k29')||label;
  if(label==='Semifinalista B')return koGameLoser('k30')||label;
  // "Finalista A/B"
  if(label==='Finalista A')return koGameWinner('k29')||label;
  if(label==='Finalista B')return koGameWinner('k30')||label;
  return label;
}

// Build fully-resolved version of KNOCKOUT_GAMES for rendering
function buildResolvedKO(){
  clearThirdCache(); // recompute 3rd-place ranking fresh each render
  return KNOCKOUT_GAMES.map(g=>{
    const rh=resolveKOSlot(g.home,g.id);
    const ra=resolveKOSlot(g.away,g.id);
    return Object.assign({},g,{home:rh,away:ra});
  });
}

function renderKnockout(){
  const resolvedGames=buildResolvedKO();
  document.getElementById('matamata-container').innerHTML=WEEKS_KNOCKOUT.map(w=>{
    const games=resolvedGames.filter(w.filter);
    return weekBlockHtml('K'+w.key,w.label,w.dates,games,gameCard);
  }).join('');
}

/* ── ARTILHEIRO ────────────────────────────── */
function setArtilheiro(name,country){P.artilheiro=name?(name+(country?' ('+country+')':'')):'';}
function renderArtilheiro(){
  document.getElementById('artilheiro-container').innerHTML=
    '<div class="art-box">'
    +'<div style="flex:1;min-width:200px"><div class="art-label">Artilheiro da Copa</div>'
    +'<div class="art-sublabel">Palpite único — registrado antes da Copa começar</div></div>'
    +'<div class="ac-wrap"><input type="text" id="art-input" class="ac-input" placeholder="Nome do jogador..."><div class="ac-dropdown" id="art-drop"></div></div>'
    +'<div class="art-pts">&#x1F3C6; +10 pontos</div>'
    +'</div>'
    +'<div class="rules-box" style="margin-top:12px">+10 pontos se o jogador indicado terminar como artilheiro da Copa. Em empate na artilharia, qualquer um dos empatados conta como acerto.</div>';
  // Must build AC after innerHTML is set so the input element exists
  buildAC('art-input','art-drop',setArtilheiro);
  // Restore saved value
  if(P.artilheiro){
    const inp=document.getElementById('art-input');
    if(inp){inp.value=P.artilheiro;inp.classList.add('ac-selected');inp.dataset.confirmed='1';}
  }
}

/* ── ESPECIAIS ─────────────────────────────── */
function toggleSpecial(el){
  const card=el.closest('[data-stype]');
  const type=card.dataset.stype,gid=card.dataset.sgid;
  const arr=P[type];
  const idx=arr.indexOf(gid);
  if(idx>-1){arr.splice(idx,1);}
  else{
    if(arr.length>=SPECIAL_CFG[type].max){toast('Máximo '+SPECIAL_CFG[type].max+' escolhas para '+SPECIAL_CFG[type].label);return;}
    arr.push(gid);
  }
  renderSpecial(type);updateKpis();
}

function renderSpecial(type){
  const cfg=SPECIAL_CFG[type];
  const chosen=P[type];
  const pool=getPool(type).slice().sort((a,b)=>a.sk-b.sk);
  const maxed=chosen.length>=cfg.max;
  let html='<div class="card" style="margin-bottom:16px">'
    +'<div class="special-header"><div class="special-title">'+cfg.desc+'</div>'
    +'<div class="special-counter'+(maxed?' maxed':'')+'">'+chosen.length+' / '+cfg.max+'</div></div>'
    +'<div class="special-grid">';
  pool.forEach(g=>{
    const sel=chosen.includes(g.id);
    const koLabel=g.ko?'<span class="ko-label" style="font-size:9px;margin-left:4px">'+g.ko+'</span>':'';
    html+='<div class="special-card'+(sel?' selected':'')+'" data-stype="'+type+'" data-sgid="'+g.id+'" onclick="toggleSpecial(this)">'
      +'<div class="special-check">'+(sel?'✓':'')+'</div>'
      +'<div class="special-info">'
      +'<div class="special-teams">'+flagImg(g.home)+' '+g.home+' × '+g.away+' '+flagImg(g.away)+'</div>'
      +'<div class="special-meta">'+g.date+' · '+g.city+koLabel+'</div>'
      +'</div></div>';
  });
  html+='</div></div>';
  document.getElementById(type+'-container').innerHTML=html;
}

function onInnerSwitch(id){
  if(id==='artilheiro') renderArtilheiro();
  if(id==='goleada') renderSpecial('goleada');
  if(id==='prorrogacao') renderSpecial('prorrogacao');
  if(id==='penaltis') renderSpecial('penaltis');
}

/* ── EXCEL EXPORT ──────────────────────────── */
function saveAndDownload(){
  const name=document.getElementById('player-name').value.trim();
  if(!name){toast('Digite seu nome antes de salvar');return;}

  const wb=XLSX.utils.book_new();

  // Sheet 1: Palpites dos jogos
  const rows1=[['Participante','ID Jogo','Data','Casa','Fora','Palpite Casa','Palpite Fora']];
  ALL_GAMES.forEach(g=>{
    const p=P.picks[g.id]||{h:'',a:''};
    rows1.push([name,g.id,g.date,g.home,g.away,p.h===''?'':Number(p.h),p.a===''?'':Number(p.a)]);
  });
  const ws1=XLSX.utils.aoa_to_sheet(rows1);
  ws1['!cols']=[{wch:20},{wch:6},{wch:22},{wch:20},{wch:20},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'Palpites');

  // Sheet 2: Artilheiro
  const ws2=XLSX.utils.aoa_to_sheet([['Participante','Artilheiro'],[name,P.artilheiro||'']]);
  ws2['!cols']=[{wch:20},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws2,'Artilheiro');

  // Sheet 3: Goleada
  const rows3=[['Participante','ID Jogo','Jogo']];
  P.goleada.forEach(gid=>{const g=ALL_GAMES.find(x=>x.id===gid);if(g) rows3.push([name,gid,g.home+' x '+g.away+' ('+g.date+')']);});
  const ws3=XLSX.utils.aoa_to_sheet(rows3);
  ws3['!cols']=[{wch:20},{wch:6},{wch:45}];
  XLSX.utils.book_append_sheet(wb,ws3,'Goleada');

  // Sheet 4: Prorrogação
  const rows4=[['Participante','ID Jogo','Jogo']];
  P.prorrogacao.forEach(gid=>{const g=ALL_GAMES.find(x=>x.id===gid);if(g) rows4.push([name,gid,g.home+' x '+g.away+' ('+g.date+')']);});
  const ws4=XLSX.utils.aoa_to_sheet(rows4);
  ws4['!cols']=[{wch:20},{wch:6},{wch:45}];
  XLSX.utils.book_append_sheet(wb,ws4,'Prorrogacao');

  // Sheet 5: Pênaltis
  const rows5=[['Participante','ID Jogo','Jogo']];
  P.penaltis.forEach(gid=>{const g=ALL_GAMES.find(x=>x.id===gid);if(g) rows5.push([name,gid,g.home+' x '+g.away+' ('+g.date+')']);});
  const ws5=XLSX.utils.aoa_to_sheet(rows5);
  ws5['!cols']=[{wch:20},{wch:6},{wch:45}];
  XLSX.utils.book_append_sheet(wb,ws5,'Penaltis');

  XLSX.writeFile(wb,'bolao_'+name.replace(/\s+/g,'_')+'.xlsx');
  toast('✓ Excel baixado com sucesso!');
}
