<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Embed</title>
<!-- Office.js: usado para SALVAR a escolha no .pptx. Offline: falha graciosa,
     o picker ainda funciona (sem persistir). Nao e auto-hospedavel. -->
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;font-family:'Segoe UI',sans-serif;background:#F4F6FA;color:#12376C}
  #app{border:0;width:100%;height:100%;display:none}
  /* Picker */
  #picker{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px}
  #picker h1{font-size:15px;color:#002060;font-weight:700}
  #picker .row{display:flex;gap:8px;width:100%;max-width:520px}
  #picker select,#picker input{flex:1;padding:9px 11px;border:1px solid #D9DCE6;border-radius:4px;font-size:13px;font-family:inherit;color:#12376C;background:#fff}
  #picker label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#7B8EA0;align-self:flex-start;width:100%;max-width:520px}
  #picker button{background:#002060;color:#fff;border:0;border-radius:4px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  #picker button:hover{opacity:.9}
  #picker .hint{font-size:11px;color:#7B8EA0;max-width:520px;text-align:center;line-height:1.5}
  #picker .stage-row{justify-content:flex-start;gap:18px}
  #picker .stage-opt{display:flex;align-items:center;gap:6px;width:auto;font-size:13px;font-weight:600;
    text-transform:none;letter-spacing:0;color:#12376C;cursor:pointer}
  #picker .stage-opt input{flex:0 0 auto;width:auto;padding:0}
  #err{color:#800000;font-size:12px;font-weight:700;display:none;max-width:520px;text-align:center}
  /* botao trocar flutuante quando app carregado */
  #swap{position:absolute;top:6px;right:6px;z-index:10;background:rgba(0,32,96,.85);color:#fff;border:0;border-radius:4px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;display:none;font-family:'Segoe UI',sans-serif}
  #swap:hover{background:#002060}
</style>
</head>
<body>
  <button id="swap" onclick="showPicker()">Trocar HTML</button>

  <div id="picker">
    <h1>Embedar HTML no slide</h1>

    <label>Ambiente</label>
    <div class="row stage-row">
      <label class="stage-opt"><input type="radio" name="stage" value="prd" checked> Produção (prd)</label>
      <label class="stage-opt"><input type="radio" name="stage" value="dev"> Homologação (dev)</label>
    </div>

    <label>Escolha um favorito (do PPR)</label>
    <div class="row">
      <select id="fav"><option value="">-- selecione --</option></select>
      <button onclick="loadFromInput()">Carregar</button>
    </div>

    <label>Ou cole uma URL HTTPS</label>
    <div class="row">
      <input id="url" type="text" placeholder="https://gradusanalytics.github.io/repo/dev/minha-tool.html">
    </div>
    <div id="err"></div>
    <p class="hint">Favoritos vêm do PPR (ferramentas freeform). O ambiente troca entre
       a URL de produção e a de homologação. URL avulsa ignora o ambiente.</p>
  </div>

  <iframe id="app" allow="fullscreen clipboard-write"></iframe>

  <script>
    var SETTINGS_KEY = "embedSrc";
    var officeReady = false;

    function el(id){ return document.getElementById(id); }

    function loadApp(src){
      if(!src){ return; }
      el("err").style.display = "none";
      var f = el("app");
      f.src = src;
      el("picker").style.display = "none";
      f.style.display = "block";
      el("swap").style.display = "block";
      saveChoice(src);
    }

    var APPS = [];

    function currentStage(){
      var r = document.querySelector('input[name="stage"]:checked');
      return r ? r.value : "prd";
    }

    function resolveFav(){
      var idx = el("fav").value;
      if(idx === "") return "";
      var a = APPS[idx]; if(!a) return "";
      var st = currentStage();
      return a[st] || a.prd || a.dev || "";   // fallback se o stage escolhido nao existe
    }

    function loadFromInput(){
      var custom = el("url").value.trim();
      var v = custom || resolveFav();
      if(!v){ return showErr("Informe uma URL ou escolha um favorito."); }
      if(!/^https:\/\//i.test(v) && !/^[\w./-]+$/.test(v)){
        return showErr("Use uma URL https:// (ou caminho relativo do mesmo host).");
      }
      loadApp(v);
    }

    function showErr(m){ var e=el("err"); e.textContent=m; e.style.display="block"; }

    function showPicker(){
      el("app").style.display="none";
      el("swap").style.display="none";
      el("picker").style.display="flex";
    }

    function saveChoice(src){
      if(!officeReady) return;
      try{
        Office.context.document.settings.set(SETTINGS_KEY, src);
        Office.context.document.settings.saveAsync();
      }catch(e){}
    }

    // carrega lista de favoritos (apps.json no mesmo host). Cada item: {name, dev?, prd?}
    function loadFavorites(){
      return fetch("apps.json").then(function(r){ return r.ok ? r.json() : []; })
        .then(function(list){
          APPS = list || [];
          var sel = el("fav");
          APPS.forEach(function(a, i){
            var o=document.createElement("option");
            o.value=String(i); o.textContent=a.name;
            sel.appendChild(o);
          });
          sel.addEventListener("change", function(){ if(sel.value){ el("url").value=""; } });
        })
        .catch(function(){});
    }

    function boot(savedSrc){
      loadFavorites().then(function(){
        if(savedSrc){ loadApp(savedSrc); }   // ja escolhido antes -> carrega direto
        else { el("picker").style.display="flex"; }
      });
    }

    // Office presente (online/cache) -> le escolha salva. Ausente (offline) -> picker.
    if(window.Office && Office.onReady){
      Office.onReady(function(){
        officeReady = true;
        var saved = "";
        try{ saved = Office.context.document.settings.get(SETTINGS_KEY) || ""; }catch(e){}
        boot(saved);
      });
    } else {
      document.addEventListener("DOMContentLoaded", function(){ boot(""); });
    }
  </script>
</body>
</html>
