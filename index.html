<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Dicas de no-cache (Pages ignora parte, mas nao custa) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>HTML Embed</title>
<!--
  SHELL DE CACHE-BUSTING.
  O WebView2 do Office cacheia agressivamente o documento de topo (este arquivo).
  Para o time nao precisar limpar cache a cada atualizacao, este shell NUNCA muda
  e apenas redireciona para app.html com uma query unica por carregamento. Como a
  URL muda sempre, o WebView e o CDN do Pages servem app.html sempre atualizado.
  TODA a logica/UI mora em app.html — edite la, nao aqui.
-->
<style>
  html,body{height:100%;margin:0;font-family:'Segoe UI',sans-serif;background:#F4F6FA;color:#7B8EA0}
  .l{height:100%;display:flex;align-items:center;justify-content:center;font-size:13px}
</style>
</head>
<body>
  <div class="l">Carregando…</div>
  <script>
    // query unica -> sem cache do app.html (nem WebView, nem CDN)
    location.replace("app.html?cb=" + Date.now());
  </script>
  <noscript><p class="l"><a href="app.html">Abrir</a></p></noscript>
</body>
</html>
