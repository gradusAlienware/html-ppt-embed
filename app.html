<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Embed</title>
<!-- Office.js: usado para SALVAR a escolha no .pptx. Offline: falha graciosa,
     o picker ainda funciona (sem persistir). Nao e auto-hospedavel. -->
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;font-family:'Segoe UI',sans-serif;background:#F4F6FA;color:#12376C}
  #app{border:0;width:100%;height:100%;display:none}
  /* Picker */
  #picker{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px}
  #picker h1{font-size:15px;color:#002060;font-weight:700}
  #picker .row{display:flex;gap:8px;width:100%;max-width:520px}
  #picker select,#picker input{flex:1;padding:9px 11px;border:1px solid #D9DCE6;border-radius:4px;font-size:13px;font-family:inherit;color:#12376C;background:#fff}
  #picker label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#7B8EA0;align-self:flex-start;width:100%;max-width:520px}
  #picker button{background:#002060;color:#fff;border:0;border-radius:4px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  #picker button:hover{opacity:.9}
  #picker .hint{font-size:11px;color:#7B8EA0;max-width:520px;text-align:center;line-height:1.5}
  #picker .stage-row{justify-content:flex-start;gap:18px}
  #picker .stage-opt{display:flex;align-items:center;gap:6px;width:auto;font-size:13px;font-weight:600;
    text-transform:none;letter-spacing:0;color:#12376C;cursor:pointer}
  #picker .stage-opt input{flex:0 0 auto;width:auto;padding:0}
  #err{color:#800000;font-size:12px;font-weight:700;display:none;max-width:520px;text-align:center}
  /* zona de hover no canto inferior direito (fica acima do iframe p/ capturar o mouse) */
  #swapZone{position:absolute;bottom:0;right:0;width:130px;height:52px;z-index:10;display:none}
  /* botao trocar: oculto, aparece ao passar o mouse na zona */
  #swap{position:absolute;bottom:8px;right:8px;display:flex;align-items:center;justify-content:center;width:28px;height:28px;padding:0;background:rgba(0,32,96,.85);color:#fff;border:0;border-radius:50%;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .15s}
  #swap svg{width:16px;height:16px;display:block}
  #swapZone:hover #swap{opacity:1;pointer-events:auto}
  #swap:hover{background:#002060}
</style>
</head>
<body>
  <div id="swapZone"><button id="swap" onclick="showPicker()" title="Trocar HTML" aria-label="Trocar HTML">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button></div>

  <div id="picker">
    <h1>Embedar HTML no slide</h1>

    <label>Ambiente</label>
    <div class="row stage-row">
      <label class="stage-opt"><input type="radio" name="stage" value="prd" checked> Produção (prd)</label>
      <label class="stage-opt"><input type="radio" name="stage" value="dev"> Homologação (dev)</label>
    </div>

    <label>Escolha um favorito (do PPR)</label>
    <div class="row">
      <select id="fav"><option value="">-- selecione --</option></select>
      <button onclick="loadFromInput()">Carregar</button>
    </div>

    <label>Ou cole uma URL HTTPS</label>
    <div class="row">
      <input id="url" type="text" placeholder="https://gradusanalytics.github.io/repo/dev/minha-tool.html">
    </div>

    <label>Ou um arquivo HTML do seu computador</label>
    <div class="row">
      <input id="file" type="file" accept=".html,.htm">
    </div>

    <div id="err"></div>
    <p class="hint">Favoritos e URL precisam estar acessíveis online. Um arquivo do computador
       é lido na hora e fica salvo dentro do .pptx — funciona melhor se for um HTML
       autossuficiente (CSS/JS embutidos ou via links https).</p>
  </div>

  <iframe id="app" allow="fullscreen clipboard-write"></iframe>

  <script>
    var SETTINGS_KEY = "embedState";
    var OLD_KEY = "embedSrc";            // compat com versao anterior
    var INLINE_LIMIT = 2000000;          // ~2 MB: acima disso roda na sessao mas nao salva no .pptx
    var STATE_PREFIX = "appState:";      // chave por-HTML do estado interno (dados inputados)
    var STATE_LIMIT = 2000000;           // ~2 MB: teto do estado salvo no .pptx
    var officeReady = false;
    var APPS = [];
    var blobUrl = null;
    var currentKey = null;               // identifica o HTML carregado (separa estado por tool)
    var saveTimer = null;

    function el(id){ return document.getElementById(id); }
    function showErr(m){ var e=el("err"); e.textContent=m; e.style.display="block"; }

    function showAppFrame(){
      el("err").style.display = "none";
      el("picker").style.display = "none";
      el("app").style.display = "block";
      el("swapZone").style.display = "block";
    }

    // Carregar por URL (favorito ou colada)
    function loadUrl(src, persist){
      if(!src) return;
      var f = el("app");
      currentKey = "u:" + src;           // estado salvo por URL
      if(blobUrl){ try{ URL.revokeObjectURL(blobUrl); }catch(e){} blobUrl=null; }
      f.src = src;
      showAppFrame();
      if(persist !== false) saveState({ kind:"url", value:src });
    }

    // Carregar conteudo HTML (arquivo local) via Blob
    function renderInline(html, name, persist){
      var f = el("app");
      currentKey = "i:" + (name||"") + ":" + html.length;   // estado salvo por arquivo inline
      if(blobUrl){ try{ URL.revokeObjectURL(blobUrl); }catch(e){} }
      blobUrl = URL.createObjectURL(new Blob([html], { type:"text/html" }));
      f.src = blobUrl;
      showAppFrame();
      if(persist !== false && html.length <= INLINE_LIMIT){
        saveState({ kind:"inline", html:html, name:name||"" });
      }
    }

    function currentStage(){
      var r = document.querySelector('input[name="stage"]:checked');
      return r ? r.value : "prd";
    }
    function resolveFav(){
      var idx = el("fav").value;
      if(idx === "") return "";
      var a = APPS[idx]; if(!a) return "";
      var st = currentStage();
      return a[st] || a.prd || a.dev || "";   // fallback se o stage nao existe
    }

    function loadFromInput(){
      var custom = el("url").value.trim();
      var v = custom || resolveFav();
      if(!v){ return showErr("Escolha um favorito, cole uma URL ou selecione um arquivo."); }
      if(!/^https:\/\//i.test(v) && !/^[\w./-]+$/.test(v)){
        return showErr("Use uma URL https:// (ou caminho relativo do mesmo host).");
      }
      loadUrl(v);
    }

    function loadLocalFile(file){
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(){ renderInline(reader.result, file.name); };
      reader.onerror = function(){ showErr("Nao consegui ler o arquivo."); };
      reader.readAsText(file);
    }

    function showPicker(){
      el("app").style.display="none";
      el("swapZone").style.display="none";
      el("picker").style.display="flex";
    }

    function saveState(obj){
      if(!officeReady) return;
      try{
        Office.context.document.settings.set(SETTINGS_KEY, JSON.stringify(obj));
        Office.context.document.settings.saveAsync();
      }catch(e){}
    }

    /* ── Bridge de estado com o HTML embedado ──────────────────────────
       O HTML alvo (iframe) manda postMessage({__embed,type:"STATE",state})
       a cada mudanca; salvamos no .pptx por chave currentKey. No load ele
       manda {type:"READY"} e devolvemos {type:"RESTORE",state} p/ rehidratar.
       Estado viaja DENTRO do .pptx (Office settings) -> outra maquina ok. */
    function stateKey(){ return currentKey ? STATE_PREFIX + currentKey : null; }

    function loadSavedState(){
      if(!officeReady) return null;
      var k = stateKey(); if(!k) return null;
      try{ var v = Office.context.document.settings.get(k); return v ? JSON.parse(v) : null; }
      catch(e){ return null; }
    }

    function postToFrame(msg){
      var f = el("app");
      if(f && f.contentWindow){ try{ f.contentWindow.postMessage(msg, "*"); }catch(e){} }
    }

    function persistState(state){
      if(!officeReady) return;
      var k = stateKey(); if(!k) return;
      var s;
      try{ s = JSON.stringify(state); }catch(e){ return; }
      if(s.length > STATE_LIMIT){                       // grande demais p/ caber no .pptx
        postToFrame({ __embed:true, type:"STATE_TOO_BIG", limit:STATE_LIMIT });
        return;
      }
      clearTimeout(saveTimer);                          // debounce: batelada saveAsync
      saveTimer = setTimeout(function(){
        try{
          Office.context.document.settings.set(k, s);
          Office.context.document.settings.saveAsync();
        }catch(e){}
      }, 600);
    }

    window.addEventListener("message", function(ev){
      var d = ev.data;
      if(!d || d.__embed !== true) return;
      if(d.type === "READY"){ postToFrame({ __embed:true, type:"RESTORE", state: loadSavedState() }); }
      else if(d.type === "STATE"){ persistState(d.state); }
    });

    // carrega favoritos (apps.json) e liga os controles
    function loadFavorites(){
      return fetch("apps.json?cb=" + Date.now()).then(function(r){ return r.ok ? r.json() : []; })
        .then(function(list){
          APPS = list || [];
          var sel = el("fav");
          APPS.forEach(function(a, i){
            var o=document.createElement("option");
            o.value=String(i); o.textContent=a.name;
            sel.appendChild(o);
          });
          sel.addEventListener("change", function(){ if(sel.value){ el("url").value=""; } });
          el("file").addEventListener("change", function(e){
            var fl = e.target.files && e.target.files[0];
            if(fl){ el("url").value=""; el("fav").value=""; loadLocalFile(fl); }
          });
        })
        .catch(function(){});
    }

    // Restaura a escolha salva no .pptx (URL ou conteudo inline)
    function restore(saved){
      if(!saved) return false;
      var st;
      try{ st = JSON.parse(saved); }
      catch(e){ st = { kind:"url", value:saved }; }   // formato antigo = string de URL
      if(st && st.kind === "url" && st.value){ loadUrl(st.value, false); return true; }
      if(st && st.kind === "inline" && st.html){ renderInline(st.html, st.name, false); return true; }
      return false;
    }

    function boot(saved){
      loadFavorites().then(function(){
        if(!restore(saved)){ el("picker").style.display="flex"; }
      });
    }

    // Office presente -> le estado salvo. Ausente (offline) -> picker.
    if(window.Office && Office.onReady){
      Office.onReady(function(){
        officeReady = true;
        var saved = "";
        try{
          var s = Office.context.document.settings;
          saved = s.get(SETTINGS_KEY) || s.get(OLD_KEY) || "";
        }catch(e){}
        boot(saved);
      });
    } else {
      document.addEventListener("DOMContentLoaded", function(){ boot(""); });
    }
  </script>
</body>
</html>
